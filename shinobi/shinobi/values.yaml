kubernetesClusterDomain: cluster.local
pvc:
  config:
    storageRequest: 2Gi
  custom:
    storageRequest: 1Gi
  videos:
    storageRequest: 50Gi
shinobi:
  ports:
  - name: web
    nodePort: 30084
    port: 8080
    targetPort: 8080
  - name: stream
    nodePort: 30083
    port: 8081
    targetPort: 8081
  replicas: 1
  shinobi:
    containerSecurityContext:
      privileged: true
    env:
      shinobiGid: "1000"
      shinobiUid: "1000"
      tz: Asia/Jerusalem
    image:
      repository: shinobisystems/shinobi
      tag: latest
    imagePullPolicy: Always
  type: NodePort
