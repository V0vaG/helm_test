apiVersion: v1
kind: Service
metadata:
  name: {{ include "taboo.fullname" . }}-service
  labels:
  {{- include "taboo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: taboo
    {{- include "taboo.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.service.ports | toYaml | nindent 2 }}